[app]
name = "Jarvis"
environment = "development"
audit_log_path = "logs/audit.jsonl"
design_tokens_path = "config/design-tokens.toml"

[network]
internet_required_for_ai = true
probe_url = "https://www.google.com/generate_204"
timeout_ms = 2500

[ai]
provider = "tiered"
base_url = ""
api_key_env = ""
flash_provider_env = "JARVIS_FLASH_PROVIDER"
flash_provider_default = "gemini"
flash_key_env = "GEMINI_API_KEY"
flash_model_env = "JARVIS_FLASH_MODEL"
flash_model = "gemini-flash-latest"
x_provider_env = "JARVIS_X_PROVIDER"
x_provider_default = "deepseek"
x_key_env = "DEEPSEEK_API_KEY"
x_model_env = "JARVIS_X_MODEL"
x_model = "deepseek-reasoner"
ultra_provider_env = "JARVIS_ULTRA_PROVIDER"
ultra_provider_default = "openrouter"
ultra_key_env = "OPENROUTER_API_KEY"
ultra_model_env = "JARVIS_ULTRA_MODEL"
ultra_model = "deepseek-v4-pro[1m]"
groq_key_env = "GROQ_API_KEY"
claude_key_env = "ANTHROPIC_API_KEY"
quality_threshold = 0.74

[google]
enabled = true
api_key_env = "GOOGLE_SEARCH_API_KEY"
engine_id_env = "GOOGLE_SEARCH_ENGINE_ID"

[voice]
enabled = true
provider = "huggingface"
api_key_env = "HUGGINGFACE_API_TOKEN"
transcribe_model_env = "HUGGINGFACE_TRANSCRIBE_MODEL"
default_transcribe_model = "openai/whisper-large-v3-turbo"

[security]
file_access_level = "intermediate"
require_audit_log = true
allow_unlimited_pc_inspection = false

[sandbox]
enabled = true
base_dir = ".sandbox"
timeout_secs = 120
cleanup_after_run = true
max_output_bytes = 200000

[paths]
authorized_roots = [
    ".",
]
